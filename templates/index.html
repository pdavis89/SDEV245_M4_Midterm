<!DOCTYPE html>
<html>
<head>
    <title>Crypto Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="mb-4 text-center">SHA-256 + AES Encryption Demo</h2>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Enter a message</label>
                            <textarea class="form-control" name="message" rows="4"></textarea>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">
                            Process
                        </button>
                    </form>

                    {% if result %}
                    <hr class="my-4">

                    <h4>Results</h4>

                    <div class="mb-3">
                        <label class="fw-bold">Original:</label>
                        <pre class="bg-light p-2 border">{{ result.original }}</pre>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Original SHA-256 Hash:</label>
                        <pre class="bg-light p-2 border">{{ result.original_hash }}</pre>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Generated AES Key (Fernet):</label>
                        <pre class="bg-light p-2 border">{{ result.key }}</pre>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Encrypted:</label>
                        <pre class="bg-light p-2 border">{{ result.encrypted }}</pre>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Decrypted:</label>
                        <pre class="bg-light p-2 border">{{ result.decrypted }}</pre>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Decrypted SHA-256 Hash:</label>
                        <pre class="bg-light p-2 border">{{ result.decrypted_hash }}</pre>
                    </div>

                    <div class="alert {{ 'alert-success' if result.integrity_ok else 'alert-danger' }}">
                        Integrity Verified: {{ result.integrity_ok }}
                    </div>

                    {% endif %}
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
